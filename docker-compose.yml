# ==============================================================================
# docker-compose.yml — Multi-service orchestration
# ==============================================================================
# Services:
#   zookeeper    Coordination service required by Kafka (broker metadata,
#                leader election). Required by the Kafka image used here.
#   kafka        Message broker. Auto-creates the 'ml-requests' and
#                'ml-predictions' topics used by the pipeline.
#   kafka-init   One-shot job that EXPLICITLY creates both topics with
#                defined partitions/replication, then exits. Runs even
#                though Kafka can auto-create topics, so topic
#                configuration is declared in version control rather than
#                left to defaults.
#   api          FastAPI inference service (Dockerfile, default CMD).
#                Exposes /predict on host port 8000.
#   kafka-worker Same image as `api`, but overrides CMD to run
#                `kafka_client.py worker` — consumes 'ml-requests', runs
#                inference, publishes to 'ml-predictions'.
#
# All services join the default Compose network and resolve each other by
# service name (e.g. the api/worker reach Kafka at "kafka:29092").
# ==============================================================================

services:
  # ----------------------------------------------------------------------
  # Zookeeper — Kafka broker coordination
  # ----------------------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD-SHELL", "echo > /dev/tcp/127.0.0.1/2181"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ----------------------------------------------------------------------
  # Kafka broker
  # ----------------------------------------------------------------------
  # KAFKA_ADVERTISED_LISTENERS defines TWO listeners:
  #   - PLAINTEXT (kafka:29092)        -> used by other containers on the
  #                                        Compose network (api, worker,
  #                                        kafka-init)
  #   - PLAINTEXT_HOST (localhost:9092) -> used by tools running on YOUR
  #                                        machine (e.g. a local
  #                                        kafka_client.py for debugging)
  # This dual-listener setup is the standard pattern for making a
  # containerized Kafka broker reachable both from inside and outside the
  # Docker network.
  # ----------------------------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      # Convenience for local/dev use; kafka-init below creates the topics
      # explicitly regardless, so this can be set to "false" in production.
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s

  # ----------------------------------------------------------------------
  # kafka-init — one-shot topic creation
  # ----------------------------------------------------------------------
  # Runs once, creates 'ml-requests' and 'ml-predictions' with explicit
  # partition/replication settings, prints confirmation, and exits (exit
  # code 0). `docker-compose up` will show this container as "Exited (0)"
  # once it finishes — that is expected, not an error.
  # ----------------------------------------------------------------------
  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["bash", "-c"]
    command:
      - |
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
          --topic ml-requests --partitions 1 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
          --topic ml-predictions --partitions 1 --replication-factor 1
        echo "Topics ready:"
        kafka-topics --bootstrap-server kafka:29092 --list

  # ----------------------------------------------------------------------
  # api — FastAPI prediction service
  # ----------------------------------------------------------------------
  api:
    build: .
    container_name: iris-api
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      KAFKA_ENABLED: "true"
      # Inside the Compose network, use the internal Kafka listener.
      KAFKA_BROKER_URL: "kafka:29092"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ----------------------------------------------------------------------
  # kafka-worker — asynchronous inference worker
  # ----------------------------------------------------------------------
  # Reuses the SAME image as `api` (built from the same Dockerfile) but
  # overrides the command to run the Kafka consumer/worker instead of the
  # web server. Scale horizontally with:
  #     docker-compose up --scale kafka-worker=3
  # Because the worker uses a shared consumer group ("ml-prediction-workers"
  # in kafka_client.py), Kafka automatically load-balances the
  # 'ml-requests' partitions across however many worker replicas are
  # running — zero code changes needed to scale.
  # ----------------------------------------------------------------------
  kafka-worker:
    build: .
    container_name: iris-kafka-worker
    command: ["python", "kafka_client.py", "worker"]
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BROKER_URL: "kafka:29092"
